name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag to build (e.g. v0.6.5)"
        required: true
        default: ""

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Build
        run: cargo build --locked --verbose

      - name: Run tests
        run: cargo test --locked --verbose

      - name: Check generated assets
        run: |
          cargo xtask
          git diff --exit-code assets/gen

  build:
    needs: quality
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: clock-tui-linux-x86_64
            builder: cargo
          - target: aarch64-unknown-linux-gnu
            artifact: clock-tui-linux-aarch64
            builder: cross

    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (aarch64 cross-compile via Docker)
        if: matrix.builder == 'cross'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Test (native only — aarch64 binaries cannot run on x86 runner)
        if: matrix.builder == 'cargo'
        run: cargo test --release --target ${{ matrix.target }} --locked --package clock-tui

      - name: Build release binary
        run: ${{ matrix.builder }} build --release --target ${{ matrix.target }} --locked --package clock-tui --bin tclock

      - name: Create tarball
        run: |
          STAGE=$(mktemp -d)
          install -Dm0755 target/${{ matrix.target }}/release/tclock "$STAGE/tclock"
          install -Dm0755 examples/widgets/tclock-system-health "$STAGE/tclock-system-health"
          install -Dm0644 LICENSE "$STAGE/LICENSE"
          install -Dm0644 README.md "$STAGE/README.md"
          install -Dm0644 docs/widget-themes.md "$STAGE/docs/widget-themes.md"
          tar czf ${{ matrix.artifact }}.tar.gz -C "$STAGE" tclock tclock-system-health LICENSE README.md docs/widget-themes.md
          rm -rf "$STAGE"

      - name: Compute SHA256
        run: |
          SHA=$(sha256sum ${{ matrix.artifact }}.tar.gz | awk '{print $1}')
          echo "$SHA  ${{ matrix.artifact }}.tar.gz" > ${{ matrix.artifact }}.tar.gz.sha256
          echo "Built ${{ matrix.artifact }}.tar.gz sha256=$SHA"

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release body
        env:
          TAG: ${{ inputs.ref || github.ref_name }}
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -Fxv "$TAG" | head -1 || true)

          {
            echo "## Install"
            echo
            echo "### Arch (AUR)"
            echo
            echo '```bash'
            echo "yay -S clock-tui-bin      # prebuilt binary from this release"
            echo '```'
            echo
            echo "### Manual"
            echo
            echo '```bash'
            echo "ARCH=x86_64  # or aarch64"
            echo "mkdir -p ~/.local/bin"
            echo "curl -fsSL https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/clock-tui-linux-\$ARCH.tar.gz | tar xz -C ~/.local/bin tclock tclock-system-health"
            echo '```'
            echo
            echo "## Checksums (SHA256)"
            echo '```'
            cat artifacts/*.sha256
            echo '```'

            if [ -n "$PREV_TAG" ]; then
              echo
              echo "**Full diff**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${TAG}"
            fi
          } > body.md

      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.ref || github.ref_name }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" artifacts/*.tar.gz artifacts/*.sha256 \
              --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file body.md
          else
            gh release create "$TAG" artifacts/*.tar.gz artifacts/*.sha256 \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --notes-file body.md \
              --latest
          fi

  publish-aur:
    needs: [build, release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || inputs.ref != ''
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Pin sha256s in PKGBUILDs
        env:
          TAG: ${{ inputs.ref || github.ref_name }}
        run: |
          X86_SHA=$(awk '{print $1}' artifacts/clock-tui-linux-x86_64.tar.gz.sha256)
          ARM_SHA=$(awk '{print $1}' artifacts/clock-tui-linux-aarch64.tar.gz.sha256)
          sed -i "s/^sha256sums_x86_64=.*/sha256sums_x86_64=('$X86_SHA')/" packaging/aur/PKGBUILD-bin
          sed -i "s/^sha256sums_aarch64=.*/sha256sums_aarch64=('$ARM_SHA')/" packaging/aur/PKGBUILD-bin

          mkdir -p staging/bin
          cp packaging/aur/PKGBUILD-bin staging/bin/PKGBUILD

      - name: Check AUR_SSH_KEY presence
        id: aur_key
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          if [ -z "$AUR_SSH_KEY" ]; then
            echo "set=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping AUR push — no AUR_SSH_KEY secret set"
          else
            echo "set=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish clock-tui-bin to AUR
        if: steps.aur_key.outputs.set == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v2.7.2
        with:
          pkgname: clock-tui-bin
          pkgbuild: ./staging/bin/PKGBUILD
          commit_username: AkitaOnRails (GitHub Actions)
          commit_email: boss@akitaonrails.com
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: "clock-tui-bin ${{ inputs.ref || github.ref_name }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519
          force_push: 'false'
